<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g filter="url(#glow)" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Document body with angular fold (blue) -->
    <g stroke="#3b82f6" stroke-width="1.5">
      <path d="M11,8 L24,8 L29,13 L29,32 L11,32 Z"/>
      <path d="M24,8 L24,13 L29,13"/>
      <!-- Data scan lines -->
      <line x1="15" y1="19" x2="25" y2="19"/>
      <line x1="15" y1="23" x2="25" y2="23"/>
      <line x1="15" y1="27" x2="20" y2="27"/>
      <!-- Status indicator dots in header -->
      <circle cx="16.5" cy="11" r="1" fill="#3b82f6" stroke="none"/>
      <circle cx="20"   cy="11" r="1" fill="#3b82f6" stroke="none"/>
    </g>
    <!-- Approval checkmark (green — success tier) -->
    <g stroke="#22c55e" stroke-width="2">
      <polyline points="14,15 17,18 23,12"/>
    </g>
    <!-- Lifecycle flow arrow (cyan — pipeline) -->
    <g stroke="#06b6d4" stroke-width="1.2">
      <line x1="32" y1="17" x2="32" y2="26"/>
      <polyline points="30,24 32,26.5 34,24"/>
    </g>
  </g>
</svg>
