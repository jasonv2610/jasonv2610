<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g filter="url(#glow)" stroke="#22c55e" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Recovery loop: upper arc (left→right clockwise, over the top) -->
    <path d="M10,18 A12,12 0 0,1 30,18"/>
    <!-- Arrowhead at end of upper arc -->
    <polyline points="27,15 30,18 27.5,21.5"/>
    <!-- Recovery loop: lower arc (right→left clockwise, under the bottom) -->
    <path d="M30,22 A12,12 0 0,1 10,22"/>
    <!-- Arrowhead at end of lower arc -->
    <polyline points="13,25 10,22 12.5,18.5"/>
    <!-- Lightning bolt (center — auto-repair signal) -->
    <polyline points="22,13 18,21 22,21 18,27" stroke-width="2" stroke-linejoin="miter"/>
  </g>
</svg>
