<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 50" width="800" height="50">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <style>
    @keyframes current-flow {
      0% { stroke-dashoffset: 60; }
      100% { stroke-dashoffset: 0; }
    }
    @keyframes pulse-fast {
      0% { stroke-dashoffset: 200; }
      100% { stroke-dashoffset: 0; }
    }
    @keyframes node-pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.7; }
    }
    .frame {
      stroke: #2d3b28;
      stroke-width: 1.8;
      fill: none;
      filter: url(#glow);
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .energy {
      stroke: #87a878;
      stroke-width: 1.8;
      fill: none;
      stroke-dasharray: 20 40;
      animation: current-flow 2s linear infinite;
      filter: url(#glow);
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .trace {
      stroke: #0a1a0a;
      stroke-width: 0.8;
      fill: none;
      opacity: 0.6;
    }
    .trace-energy {
      stroke: #87a878;
      stroke-width: 1;
      fill: none;
      stroke-dasharray: 8 52;
      animation: pulse-fast 3s linear infinite;
      filter: url(#softglow);
      opacity: 0.4;
    }
    .node {
      fill: #3d5c34;
      filter: url(#glow);
      animation: node-pulse 2s ease-in-out infinite;
    }
    .node-bright {
      fill: #87a878;
      filter: url(#glow);
      animation: node-pulse 1.5s ease-in-out infinite;
    }
  </style>

  <!-- Main frame: bottom line with corners rising up on both sides -->
  <path class="frame" d="M 10,0 L 10,40 L 790,40 L 790,0"/>

  <!-- Energy pulse along frame -->
  <path class="energy" d="M 10,0 L 10,40 L 790,40 L 790,0"/>

  <!-- Circuit branch traces along bottom -->
  <path class="trace" d="M 140,40 L 140,46 L 240,46 L 240,40"/>
  <path class="trace" d="M 340,40 L 340,46 L 460,46 L 460,40"/>
  <path class="trace" d="M 560,40 L 560,46 L 660,46 L 660,40"/>

  <!-- Energy on traces -->
  <path class="trace-energy" d="M 140,40 L 140,46 L 240,46 L 240,40"/>
  <path class="trace-energy" d="M 340,40 L 340,46 L 460,46 L 460,40" style="animation-delay:-1s"/>
  <path class="trace-energy" d="M 560,40 L 560,46 L 660,46 L 660,40" style="animation-delay:-2s"/>

  <!-- Inner branch traces rising up -->
  <path class="trace" d="M 100,40 L 100,28 L 180,28 L 180,40"/>
  <path class="trace" d="M 300,40 L 300,28 L 380,28 L 380,40"/>
  <path class="trace" d="M 500,40 L 500,28 L 580,28 L 580,40"/>
  <path class="trace" d="M 680,40 L 680,28 L 730,28 L 730,40"/>

  <path class="trace-energy" d="M 100,40 L 100,28 L 180,28 L 180,40" style="animation-delay:-0.5s"/>
  <path class="trace-energy" d="M 500,40 L 500,28 L 580,28 L 580,40" style="animation-delay:-1.5s"/>

  <!-- Junction nodes -->
  <circle class="node-bright" cx="10" cy="40" r="3.5"/>
  <circle class="node" cx="100" cy="40" r="2"/>
  <circle class="node-bright" cx="140" cy="40" r="2"/>
  <circle class="node" cx="180" cy="40" r="2"/>
  <circle class="node-bright" cx="240" cy="40" r="2"/>
  <circle class="node" cx="300" cy="40" r="2"/>
  <circle class="node-bright" cx="340" cy="40" r="2"/>
  <circle class="node" cx="380" cy="40" r="2"/>
  <circle class="node-bright" cx="460" cy="40" r="2"/>
  <circle class="node" cx="500" cy="40" r="2"/>
  <circle class="node-bright" cx="560" cy="40" r="2"/>
  <circle class="node" cx="580" cy="40" r="2"/>
  <circle class="node-bright" cx="660" cy="40" r="2"/>
  <circle class="node" cx="680" cy="40" r="2"/>
  <circle class="node-bright" cx="730" cy="40" r="2"/>
  <circle class="node-bright" cx="790" cy="40" r="3.5"/>
</svg>