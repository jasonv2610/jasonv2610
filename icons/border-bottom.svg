<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 70" width="800" height="70">
  <defs>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow2" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <style>
    @keyframes flow{0%{stroke-dashoffset:120}100%{stroke-dashoffset:0}}
    @keyframes rflow{0%{stroke-dashoffset:0}100%{stroke-dashoffset:120}}
    @keyframes pulse{0%,100%{opacity:0.35}50%{opacity:1}}
    @keyframes twinkle{0%,100%{opacity:0.1}50%{opacity:0.85}}
    .bg{fill:#0d1117}
    .fr{stroke:#06b6d4;stroke-width:1.5;fill:none;filter:url(#glow)}
    .fr2{stroke:#a855f7;stroke-width:0.7;fill:none;opacity:0.6}
    .en{stroke:#06b6d4;stroke-width:1.5;fill:none;stroke-dasharray:40 80;animation:flow 3.5s linear infinite;filter:url(#glow)}
    .en2{stroke:#a855f7;stroke-width:0.9;fill:none;stroke-dasharray:25 95;animation:rflow 5s linear infinite;filter:url(#glow2);opacity:0.5}
    .tr{stroke:#162a42;stroke-width:0.8;fill:none}
    .tl{stroke:#3b82f6;stroke-width:0.8;fill:none;stroke-dasharray:8 32;animation:rflow 5s linear infinite;opacity:0.45}
    .nc{fill:#06b6d4;filter:url(#glow);animation:pulse 2s ease-in-out infinite}
    .np{fill:#a855f7;filter:url(#glow2);animation:pulse 2.4s ease-in-out infinite}
    .nb{fill:#3b82f6;filter:url(#glow2);animation:pulse 2.8s ease-in-out infinite}
    .st{fill:#c8d6e5;animation:twinkle 3s ease-in-out infinite}
    .sb{fill:#e8f0fe;animation:twinkle 2s ease-in-out infinite}
    .sp{animation:twinkle 2.5s ease-in-out infinite}
  </style>

  <!-- Background -->
  <rect class="bg" x="0" y="0" width="800" height="70"/>

  <!-- Outer chamfered rectangle frame -->
  <path class="fr"  d="M14,2 L786,2 L798,14 L798,56 L786,68 L14,68 L2,56 L2,14Z"/>
  <path class="en"  d="M14,2 L786,2 L798,14 L798,56 L786,68 L14,68 L2,56 L2,14Z"/>
  <path class="en2" d="M14,2 L786,2 L798,14 L798,56 L786,68 L14,68 L2,56 L2,14Z"/>

  <!-- Inner accent frame -->
  <path class="fr2" d="M18,6 L782,6 L794,18 L794,52 L782,64 L18,64 L6,52 L6,18Z"/>

  <!-- Horizontal circuit traces -->
  <line class="tr" x1="14"  y1="24" x2="786" y2="24"/>
  <line class="tr" x1="14"  y1="46" x2="786" y2="46"/>

  <!-- Vertical circuit traces (varied positions from top SVG) -->
  <line class="tr" x1="130" y1="24" x2="130" y2="46"/>
  <line class="tr" x1="255" y1="2"  x2="255" y2="24"/>
  <line class="tr" x1="255" y1="46" x2="255" y2="68"/>
  <line class="tr" x1="400" y1="24" x2="400" y2="46"/>
  <line class="tr" x1="545" y1="2"  x2="545" y2="24"/>
  <line class="tr" x1="545" y1="46" x2="545" y2="68"/>
  <line class="tr" x1="670" y1="24" x2="670" y2="46"/>
  <line class="tr" x1="160" y1="2"  x2="160" y2="24"/>
  <line class="tr" x1="160" y1="46" x2="160" y2="68"/>

  <!-- Animated live trace pulses (reversed direction for bottom) -->
  <line class="tl" x1="786" y1="24" x2="300" y2="24" style="animation-delay:-1s"/>
  <line class="tl" x1="500" y1="46" x2="14"  y2="46" style="animation-delay:-3s"/>

  <!-- Stars: upper zone (y 8–21) -->
  <circle class="st" cx="72"  cy="11" r="0.8" style="animation-delay:-0.3s"/>
  <circle class="sb" cx="120" cy="13" r="1.1" style="animation-delay:-1.1s"/>
  <circle class="st" cx="218" cy="10" r="0.7" style="animation-delay:-1.9s"/>
  <circle class="st" cx="330" cy="12" r="0.8" style="animation-delay:-0.6s"/>
  <circle class="sb" cx="444" cy="9"  r="1.2" style="animation-delay:-2.2s"/>
  <circle class="st" cx="500" cy="14" r="0.7" style="animation-delay:-1.5s"/>
  <circle class="sb" cx="612" cy="11" r="1.0" style="animation-delay:-0.9s"/>
  <circle class="st" cx="690" cy="13" r="0.8" style="animation-delay:-2.6s"/>
  <circle class="sb" cx="748" cy="10" r="1.1" style="animation-delay:-1.3s"/>

  <!-- Stars: middle zone (y 27–43) -->
  <circle class="sb" cx="100" cy="36" r="1.2" style="animation-delay:-2.0s"/>
  <circle class="st" cx="310" cy="32" r="0.8" style="animation-delay:-0.8s"/>
  <circle class="st" cx="490" cy="38" r="0.8" style="animation-delay:-1.7s"/>
  <circle class="sb" cx="720" cy="34" r="1.1" style="animation-delay:-2.4s"/>

  <!-- Stars: lower zone (y 49–65) -->
  <circle class="st" cx="68"  cy="54" r="0.8" style="animation-delay:-1.2s"/>
  <circle class="sb" cx="200" cy="57" r="1.2" style="animation-delay:-0.5s"/>
  <circle class="st" cx="365" cy="53" r="0.7" style="animation-delay:-2.1s"/>
  <circle class="st" cx="470" cy="60" r="0.8" style="animation-delay:-1.0s"/>
  <circle class="sb" cx="610" cy="55" r="1.0" style="animation-delay:-2.7s"/>
  <circle class="st" cx="752" cy="58" r="0.8" style="animation-delay:-0.4s"/>
  <circle class="st" cx="774" cy="53" r="0.7" style="animation-delay:-1.6s"/>

  <!-- Sparkle crosses (4-pointed electric stars) -->
  <g class="sp" style="animation-delay:-0.5s">
    <line x1="340" y1="11" x2="340" y2="15" stroke="#06b6d4" stroke-width="1.2" filter="url(#glow2)"/>
    <line x1="338" y1="13" x2="342" y2="13" stroke="#06b6d4" stroke-width="1.2" filter="url(#glow2)"/>
  </g>
  <g class="sp" style="animation-delay:-1.6s">
    <line x1="580" y1="55" x2="580" y2="59" stroke="#a855f7" stroke-width="1.2" filter="url(#glow2)"/>
    <line x1="578" y1="57" x2="582" y2="57" stroke="#a855f7" stroke-width="1.2" filter="url(#glow2)"/>
  </g>
  <g class="sp" style="animation-delay:-2.2s">
    <line x1="760" y1="33" x2="760" y2="37" stroke="#3b82f6" stroke-width="1.2" filter="url(#glow2)"/>
    <line x1="758" y1="35" x2="762" y2="35" stroke="#3b82f6" stroke-width="1.2" filter="url(#glow2)"/>
  </g>
  <g class="sp" style="animation-delay:-1.0s">
    <line x1="42"  cy="35" x2="42"  y2="39" stroke="#06b6d4" stroke-width="1.2" filter="url(#glow2)"/>
    <line x1="40"  cy="37" x2="44"  y2="37" stroke="#06b6d4" stroke-width="1.2" filter="url(#glow2)"/>
  </g>

  <!-- Electric circuit nodes at trace intersections -->
  <circle class="np" cx="130" cy="24" r="3"   style="animation-delay:-0.3s"/>
  <circle class="nc" cx="130" cy="46" r="2.5" style="animation-delay:-1.1s"/>
  <circle class="nb" cx="160" cy="24" r="2.5" style="animation-delay:-0.7s"/>
  <circle class="np" cx="160" cy="46" r="2.5" style="animation-delay:-1.8s"/>
  <circle class="nc" cx="255" cy="24" r="3"   style="animation-delay:-1.4s"/>
  <circle class="nb" cx="255" cy="46" r="3"   style="animation-delay:-0.5s"/>
  <circle class="np" cx="400" cy="24" r="3"   style="animation-delay:-2.0s"/>
  <circle class="nc" cx="400" cy="46" r="3"   style="animation-delay:-0.9s"/>
  <circle class="nb" cx="545" cy="24" r="2.5" style="animation-delay:-1.6s"/>
  <circle class="nc" cx="545" cy="46" r="2.5" style="animation-delay:-2.4s"/>
  <circle class="np" cx="670" cy="24" r="2.5" style="animation-delay:-0.2s"/>
  <circle class="nb" cx="670" cy="46" r="2.5" style="animation-delay:-1.3s"/>

  <!-- Corner nodes (large, bright cyan) -->
  <circle class="nc" cx="14"  cy="14" r="5" style="animation-delay:-0.2s"/>
  <circle class="nc" cx="786" cy="14" r="5" style="animation-delay:-0.8s"/>
  <circle class="nc" cx="786" cy="56" r="5" style="animation-delay:-1.3s"/>
  <circle class="nc" cx="14"  cy="56" r="5" style="animation-delay:-1.8s"/>

  <!-- HUD corner bracket accents (blue) -->
  <path style="stroke:#3b82f6;stroke-width:1;fill:none;opacity:0.85" d="M30,5 L7,5 L7,30"/>
  <path style="stroke:#3b82f6;stroke-width:1;fill:none;opacity:0.85" d="M770,5 L793,5 L793,30"/>
  <path style="stroke:#3b82f6;stroke-width:1;fill:none;opacity:0.85" d="M770,65 L793,65 L793,40"/>
  <path style="stroke:#3b82f6;stroke-width:1;fill:none;opacity:0.85" d="M30,65 L7,65 L7,40"/>
</svg>
