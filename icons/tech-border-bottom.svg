<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 24" width="800" height="24">
  <style>
    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }
    @keyframes trace {
      0% { stroke-dashoffset: 40; }
      100% { stroke-dashoffset: 0; }
    }
    .node { fill: #87A878; }
    .line { stroke: #87A878; stroke-width: 1; fill: none; }
    .glow-line { stroke: #87A878; stroke-width: 1.5; fill: none; opacity: 0.4; }
    .pulse-dot { fill: #87A878; }
    .p1 { animation: pulse 2s ease-in-out 0.2s infinite; }
    .p2 { animation: pulse 2s ease-in-out 0.6s infinite; }
    .p3 { animation: pulse 2s ease-in-out 1.0s infinite; }
    .p4 { animation: pulse 2s ease-in-out 1.4s infinite; }
    .p5 { animation: pulse 2s ease-in-out 1.8s infinite; }
    .trace-line {
      stroke: #87A878;
      stroke-width: 1;
      fill: none;
      stroke-dasharray: 8 4;
      animation: trace 1.5s linear infinite;
    }
    .corner { stroke: #87A878; stroke-width: 1.5; fill: none; }
    .dim { stroke: #6d8b74; fill: none; stroke-width: 0.5; opacity: 0.5; }
  </style>
  <!-- Left corner bracket (bottom-left, opens upward) -->
  <path class="corner" d="M4 4 L4 20 L28 20"/>
  <circle class="node p1" cx="4" cy="4" r="2"/>
  <circle class="node" cx="28" cy="20" r="1.5"/>
  <!-- Left circuit trace -->
  <line class="trace-line" x1="30" y1="20" x2="120" y2="20"/>
  <circle class="pulse-dot p2" cx="120" cy="20" r="2"/>
  <line class="dim" x1="120" y1="20" x2="120" y2="10"/>
  <circle class="node" cx="120" cy="10" r="1"/>
  <!-- Left-center segment -->
  <line class="glow-line" x1="122" y1="20" x2="280" y2="20"/>
  <circle class="pulse-dot p3" cx="280" cy="20" r="2"/>
  <line class="dim" x1="280" y1="20" x2="280" y2="12"/>
  <!-- Center node cluster -->
  <line class="line" x1="282" y1="20" x2="380" y2="20"/>
  <path class="corner" d="M380 20 L400 12 L420 20"/>
  <circle class="node p4" cx="400" cy="12" r="2.5"/>
  <line class="line" x1="420" y1="20" x2="518" y2="20"/>
  <!-- Right-center segment -->
  <line class="glow-line" x1="520" y1="20" x2="680" y2="20"/>
  <circle class="pulse-dot p3" cx="520" cy="20" r="2"/>
  <line class="dim" x1="520" y1="20" x2="520" y2="12"/>
  <!-- Right circuit trace -->
  <circle class="pulse-dot p2" cx="680" cy="20" r="2"/>
  <line class="dim" x1="680" y1="20" x2="680" y2="10"/>
  <circle class="node" cx="680" cy="10" r="1"/>
  <line class="trace-line" x1="682" y1="20" x2="772" y2="20"/>
  <circle class="node" cx="772" cy="20" r="1.5"/>
  <!-- Right corner bracket (bottom-right, opens upward) -->
  <path class="corner" d="M772 20 L796 20 L796 4"/>
  <circle class="node p5" cx="796" cy="4" r="2"/>
</svg>