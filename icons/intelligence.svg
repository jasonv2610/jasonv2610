<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g filter="url(#glow)" stroke="#87A878" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Brain: left hemisphere -->
    <path d="M20 10c-2 0-3.5.8-4.5 2-1.2 1.5-1.5 3.5-1.5 5 0 1-.8 2-2 2.5-.8.3-1 1.2-.5 2 .8 1.2 1.5 2.5 2 4 .5 1.5 1.5 3 3 3.5 1 .3 2.2.5 3.5.5"/>
    <!-- Brain: right hemisphere -->
    <path d="M20 10c2 0 3.5.8 4.5 2 1.2 1.5 1.5 3.5 1.5 5 0 1 .8 2 2 2.5.8.3 1 1.2.5 2-.8 1.2-1.5 2.5-2 4-.5 1.5-1.5 3-3 3.5-1 .3-2.2.5-3.5.5"/>
    <!-- Center divide -->
    <line x1="20" y1="10" x2="20" y2="29.5"/>
    <!-- Brain folds -->
    <path d="M15 16c1.5.5 3 .5 5 0"/>
    <path d="M25 16c-1.5.5-3 .5-5 0"/>
    <path d="M14.5 22c2-.5 3.5 0 5.5.5"/>
    <path d="M25.5 22c-2-.5-3.5 0-5.5.5"/>
    <!-- Signal waves radiating from top-right -->
    <path d="M27 9c1.5 1 2.5 2.5 3 4.5" stroke-opacity="0.7"/>
    <path d="M29 7c2 1.5 3.5 3.5 4 6.5" stroke-opacity="0.5"/>
    <path d="M31 5c2.5 2 4.5 4.5 5 8.5" stroke-opacity="0.3"/>
  </g>
</svg>