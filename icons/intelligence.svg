<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g filter="url(#glow)" stroke="#a855f7" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Outer neural nodes (6-point hexagonal pattern, r=11) -->
    <circle cx="20"  cy="9"    r="2.5"/>
    <circle cx="29.5" cy="14.5" r="2.5"/>
    <circle cx="29.5" cy="25.5" r="2.5"/>
    <circle cx="20"  cy="31"   r="2.5"/>
    <circle cx="10.5" cy="25.5" r="2.5"/>
    <circle cx="10.5" cy="14.5" r="2.5"/>
    <!-- Connection lines (hub → nodes, stopping short of circles) -->
    <line x1="20"   y1="16.5" x2="20"   y2="11.5"/>
    <line x1="22.8" y1="18"   x2="27.2" y2="16"/>
    <line x1="22.8" y1="22"   x2="27.2" y2="24"/>
    <line x1="20"   y1="23.5" x2="20"   y2="28.5"/>
    <line x1="17.2" y1="22"   x2="12.8" y2="24"/>
    <line x1="17.2" y1="18"   x2="12.8" y2="16"/>
    <!-- Central hub -->
    <circle cx="20" cy="20" r="3.5"/>
    <circle cx="20" cy="20" r="1.5" fill="#a855f7" stroke="none"/>
    <!-- Signal arcs (AI broadcast, top-right) -->
    <path d="M30.5,10.5 Q33.5,15.5 32,21" stroke-opacity="0.65" stroke-width="1.2"/>
    <path d="M33,8 Q37,14.5 35,22"        stroke-opacity="0.3"  stroke-width="1"/>
  </g>
</svg>
