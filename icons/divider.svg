<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 40" width="800" height="40">
  <defs>
    <!-- Deep red glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Subtle outer glow -->
    <filter id="softglow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Main circuit gradient -->
    <linearGradient id="circuit-red" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0a0f1c" stop-opacity="0"/>
      <stop offset="10%" stop-color="#8b0000"/>
      <stop offset="30%" stop-color="#cc1100"/>
      <stop offset="50%" stop-color="#ff1a1a"/>
      <stop offset="70%" stop-color="#cc1100"/>
      <stop offset="90%" stop-color="#8b0000"/>
      <stop offset="100%" stop-color="#0a0f1c" stop-opacity="0"/>
    </linearGradient>
    <!-- Energy pulse gradient -->
    <linearGradient id="pulse" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff1a1a" stop-opacity="0"/>
      <stop offset="40%" stop-color="#ff4444" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#ff6666" stop-opacity="1"/>
      <stop offset="60%" stop-color="#ff4444" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ff1a1a" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <style>
    @keyframes current-flow {
      0% { stroke-dashoffset: 60; }
      100% { stroke-dashoffset: 0; }
    }
    @keyframes pulse-move {
      0% { stroke-dashoffset: 200; }
      100% { stroke-dashoffset: 0; }
    }
    @keyframes node-pulse {
      0%, 100% { opacity: 0.5; r: 2; }
      50% { opacity: 1; r: 3; }
    }
    .circuit-main { 
      stroke: url(#circuit-red); 
      stroke-width: 1.5; 
      fill: none; 
      filter: url(#glow); 
    }
    .circuit-trace {
      stroke: #8b0000;
      stroke-width: 0.8;
      fill: none;
      opacity: 0.6;
    }
    .energy {
      stroke: url(#pulse);
      stroke-width: 2;
      fill: none;
      stroke-dasharray: 20 40;
      animation: current-flow 2s linear infinite;
      filter: url(#glow);
    }
    .energy-fast {
      stroke: #ff4444;
      stroke-width: 1.2;
      fill: none;
      stroke-dasharray: 8 52;
      animation: pulse-move 3s linear infinite;
      filter: url(#softglow);
      opacity: 0.7;
    }
    .node {
      fill: #cc1100;
      filter: url(#glow);
      animation: node-pulse 2s ease-in-out infinite;
    }
    .node-bright {
      fill: #ff3333;
      filter: url(#glow);
      animation: node-pulse 1.5s ease-in-out infinite;
    }
  </style>

  <!-- Main horizontal circuit line -->
  <line class="circuit-main" x1="40" y1="20" x2="760" y2="20" stroke-linecap="round"/>

  <!-- Upper trace with right-angle bends -->
  <path class="circuit-trace" d="M 80,20 L 80,12 L 160,12 L 160,20" />
  <path class="circuit-trace" d="M 280,20 L 280,10 L 340,10 L 340,20" />
  <path class="circuit-trace" d="M 460,20 L 460,12 L 520,12 L 520,20" />
  <path class="circuit-trace" d="M 640,20 L 640,10 L 720,10 L 720,20" />

  <!-- Lower trace with right-angle bends -->
  <path class="circuit-trace" d="M 120,20 L 120,28 L 200,28 L 200,20" />
  <path class="circuit-trace" d="M 360,20 L 360,30 L 420,30 L 420,20" />
  <path class="circuit-trace" d="M 560,20 L 560,28 L 620,28 L 620,20" />

  <!-- Animated energy pulses along main line -->
  <line class="energy" x1="40" y1="20" x2="760" y2="20" stroke-linecap="round"/>

  <!-- Secondary energy traces -->
  <path class="energy-fast" d="M 80,20 L 80,12 L 160,12 L 160,20" />
  <path class="energy-fast" d="M 280,20 L 280,10 L 340,10 L 340,20" style="animation-delay: -0.8s"/>
  <path class="energy-fast" d="M 460,20 L 460,12 L 520,12 L 520,20" style="animation-delay: -1.6s"/>
  <path class="energy-fast" d="M 360,20 L 360,30 L 420,30 L 420,20" style="animation-delay: -0.4s"/>
  <path class="energy-fast" d="M 560,20 L 560,28 L 620,28 L 620,20" style="animation-delay: -1.2s"/>

  <!-- Circuit junction nodes -->
  <circle class="node" cx="80" cy="20" r="2.5"/>
  <circle class="node-bright" cx="160" cy="20" r="2.5"/>
  <circle class="node" cx="200" cy="20" r="2.5"/>
  <circle class="node-bright" cx="280" cy="20" r="2.5"/>
  <circle class="node" cx="340" cy="20" r="2.5"/>
  <circle class="node-bright" cx="360" cy="20" r="2.5"/>
  <circle class="node" cx="420" cy="20" r="2.5"/>
  <circle class="node-bright" cx="460" cy="20" r="2.5"/>
  <circle class="node" cx="520" cy="20" r="2.5"/>
  <circle class="node-bright" cx="560" cy="20" r="2.5"/>
  <circle class="node" cx="620" cy="20" r="2.5"/>
  <circle class="node-bright" cx="640" cy="20" r="2.5"/>
  <circle class="node" cx="720" cy="20" r="2.5"/>

  <!-- End caps - small voltage symbols -->
  <circle class="node-bright" cx="40" cy="20" r="3"/>
  <circle class="node-bright" cx="760" cy="20" r="3"/>
</svg>