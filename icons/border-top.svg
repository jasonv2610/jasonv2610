<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 50" width="800" height="50">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <style>
    @keyframes current-flow {
      0% { stroke-dashoffset: 60; }
      100% { stroke-dashoffset: 0; }
    }
    @keyframes pulse-fast {
      0% { stroke-dashoffset: 200; }
      100% { stroke-dashoffset: 0; }
    }
    @keyframes node-pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.7; }
    }
    .frame {
      stroke: #2d3b28;
      stroke-width: 1.8;
      fill: none;
      filter: url(#glow);
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .energy {
      stroke: #87a878;
      stroke-width: 1.8;
      fill: none;
      stroke-dasharray: 20 40;
      animation: current-flow 2s linear infinite;
      filter: url(#glow);
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .trace {
      stroke: #0a1a0a;
      stroke-width: 0.8;
      fill: none;
      opacity: 0.6;
    }
    .trace-energy {
      stroke: #87a878;
      stroke-width: 1;
      fill: none;
      stroke-dasharray: 8 52;
      animation: pulse-fast 3s linear infinite;
      filter: url(#softglow);
      opacity: 0.4;
    }
    .node {
      fill: #3d5c34;
      filter: url(#glow);
      animation: node-pulse 2s ease-in-out infinite;
    }
    .node-bright {
      fill: #87a878;
      filter: url(#glow);
      animation: node-pulse 1.5s ease-in-out infinite;
    }
  </style>

  <!-- Main frame: top line with corners dropping down on both sides -->
  <path class="frame" d="M 10,50 L 10,10 L 790,10 L 790,50"/>

  <!-- Energy pulse along frame -->
  <path class="energy" d="M 10,50 L 10,10 L 790,10 L 790,50"/>

  <!-- Circuit branch traces along top -->
  <path class="trace" d="M 140,10 L 140,4 L 240,4 L 240,10"/>
  <path class="trace" d="M 340,10 L 340,4 L 460,4 L 460,10"/>
  <path class="trace" d="M 560,10 L 560,4 L 660,4 L 660,10"/>

  <!-- Energy on traces -->
  <path class="trace-energy" d="M 140,10 L 140,4 L 240,4 L 240,10"/>
  <path class="trace-energy" d="M 340,10 L 340,4 L 460,4 L 460,10" style="animation-delay:-1s"/>
  <path class="trace-energy" d="M 560,10 L 560,4 L 660,4 L 660,10" style="animation-delay:-2s"/>

  <!-- Inner branch traces dropping down -->
  <path class="trace" d="M 100,10 L 100,22 L 180,22 L 180,10"/>
  <path class="trace" d="M 300,10 L 300,22 L 380,22 L 380,10"/>
  <path class="trace" d="M 500,10 L 500,22 L 580,22 L 580,10"/>
  <path class="trace" d="M 680,10 L 680,22 L 730,22 L 730,10"/>

  <path class="trace-energy" d="M 100,10 L 100,22 L 180,22 L 180,10" style="animation-delay:-0.5s"/>
  <path class="trace-energy" d="M 500,10 L 500,22 L 580,22 L 580,10" style="animation-delay:-1.5s"/>

  <!-- Junction nodes -->
  <circle class="node-bright" cx="10" cy="10" r="3.5"/>
  <circle class="node" cx="100" cy="10" r="2"/>
  <circle class="node-bright" cx="140" cy="10" r="2"/>
  <circle class="node" cx="180" cy="10" r="2"/>
  <circle class="node-bright" cx="240" cy="10" r="2"/>
  <circle class="node" cx="300" cy="10" r="2"/>
  <circle class="node-bright" cx="340" cy="10" r="2"/>
  <circle class="node" cx="380" cy="10" r="2"/>
  <circle class="node-bright" cx="460" cy="10" r="2"/>
  <circle class="node" cx="500" cy="10" r="2"/>
  <circle class="node-bright" cx="560" cy="10" r="2"/>
  <circle class="node" cx="580" cy="10" r="2"/>
  <circle class="node-bright" cx="660" cy="10" r="2"/>
  <circle class="node" cx="680" cy="10" r="2"/>
  <circle class="node-bright" cx="730" cy="10" r="2"/>
  <circle class="node-bright" cx="790" cy="10" r="3.5"/>
</svg>