<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="900" height="200">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#0f0c29"/>
      <stop offset="28%"  stop-color="#302b63"/>
      <stop offset="58%"  stop-color="#b5547a"/>
      <stop offset="80%"  stop-color="#e87c58"/>
      <stop offset="100%" stop-color="#f4a05a"/>
    </linearGradient>
    <radialGradient id="sunglow" cx="50%" cy="80%" r="30%">
      <stop offset="0%"   stop-color="#ffe566" stop-opacity="0.9"/>
      <stop offset="35%"  stop-color="#ff8c42" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ff4400" stop-opacity="0"/>
    </radialGradient>
    <style>
      @keyframes pulse  { 0%,100%{opacity:0.5} 50%{opacity:0.8} }
      @keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
      @keyframes twinkA { 0%,100%{opacity:0.9} 50%{opacity:0.2} }
      @keyframes twinkB { 0%,100%{opacity:0.5} 50%{opacity:1.0} }
      @keyframes twinkC { 0%,100%{opacity:0.7} 40%{opacity:0.1} 80%{opacity:0.9} }
      .glow  { animation: pulse  4s ease-in-out infinite; }
      .title { animation: fadeUp 1.1s ease-out both; }
      .sub   { animation: fadeUp 1.4s 0.25s ease-out both; }
      .stA   { animation: twinkA 3s ease-in-out infinite; }
      .stB   { animation: twinkB 4.5s ease-in-out infinite; }
      .stC   { animation: twinkC 2.8s ease-in-out infinite; }
      .stD   { animation: twinkA 5.2s 1s ease-in-out infinite; }
      .stE   { animation: twinkB 3.7s 0.6s ease-in-out infinite; }
      .stF   { animation: twinkC 4.1s 1.3s ease-in-out infinite; }
    </style>
  </defs>

  <!-- Sky -->
  <rect width="900" height="200" fill="url(#sky)"/>

  <!-- Sun glow -->
  <ellipse class="glow" cx="450" cy="158" rx="135" ry="68" fill="url(#sunglow)"/>

  <!-- Horizon shimmer -->
  <rect x="0" y="152" width="900" height="2" fill="#f9c06a" opacity="0.3"/>

  <!-- Back mountains -->
  <path d="M-10,165 L80,94 L155,140 L238,74 L318,118 L400,57 L482,108 L566,61 L648,100 L728,47 L810,88 L910,54 L910,200 L-10,200 Z"
        fill="#1a0a2e" opacity="0.72"/>

  <!-- Front mountains -->
  <path d="M-10,200 L54,162 L114,188 L198,142 L284,178 L368,127 L454,168 L538,119 L624,162 L710,111 L796,152 L878,117 L910,138 L910,200 Z"
        fill="#0a0616"/>

  <!-- Bottom blend wave -->
  <path d="M0,190 Q225,182 450,190 Q675,198 900,190 L900,200 L0,200 Z" fill="#0d1117"/>

  <!-- Stars — scattered across upper sky -->
  <circle class="stA" cx="42"  cy="12"  r="1.4" fill="#fff"/>
  <circle class="stB" cx="88"  cy="28"  r="1.0" fill="#ffeaa0"/>
  <circle class="stC" cx="135" cy="8"   r="1.6" fill="#fff"/>
  <circle class="stD" cx="190" cy="22"  r="1.1" fill="#fff" opacity="0.8"/>
  <circle class="stE" cx="234" cy="6"   r="1.3" fill="#ffeaa0"/>
  <circle class="stF" cx="278" cy="33"  r="0.9" fill="#fff" opacity="0.7"/>
  <circle class="stA" cx="315" cy="14"  r="1.5" fill="#fff"/>
  <circle class="stB" cx="358" cy="5"   r="1.0" fill="#ffeaa0" opacity="0.85"/>
  <circle class="stC" cx="412" cy="18"  r="1.2" fill="#fff"/>
  <circle class="stD" cx="460" cy="7"   r="1.4" fill="#fff"/>
  <circle class="stE" cx="505" cy="26"  r="1.0" fill="#ffeaa0"/>
  <circle class="stF" cx="548" cy="10"  r="1.6" fill="#fff" opacity="0.8"/>
  <circle class="stA" cx="594" cy="30"  r="0.9" fill="#fff" opacity="0.75"/>
  <circle class="stB" cx="638" cy="9"   r="1.3" fill="#ffeaa0"/>
  <circle class="stC" cx="682" cy="20"  r="1.1" fill="#fff"/>
  <circle class="stD" cx="724" cy="5"   r="1.5" fill="#fff"/>
  <circle class="stE" cx="768" cy="28"  r="1.0" fill="#ffeaa0" opacity="0.85"/>
  <circle class="stF" cx="815" cy="12"  r="1.4" fill="#fff"/>
  <circle class="stA" cx="856" cy="24"  r="1.2" fill="#fff" opacity="0.8"/>
  <circle class="stB" cx="883" cy="8"   r="1.0" fill="#ffeaa0"/>
  <!-- A few 4-point sparkle stars -->
  <path class="stC" d="M60,40 L61.2,37 L62.4,40 L65,41.2 L62.4,42.4 L61.2,45 L60,42.4 L57,41.2 Z" fill="#fff" opacity="0.75"/>
  <path class="stE" d="M780,15 L781,12.5 L782,15 L784.5,16 L782,17 L781,19.5 L780,17 L777.5,16 Z" fill="#fff" opacity="0.7"/>
  <path class="stA" d="M250,14 L251,11.5 L252,14 L254.5,15 L252,16 L251,18.5 L250,16 L247.5,15 Z" fill="#ffeaa0" opacity="0.8"/>

  <!-- Title -->
  <text class="title" x="450" y="90" text-anchor="middle"
        font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="42" font-weight="700" fill="#ffffff">Hey, I&#39;m Jason &#x1F44B;</text>

  <!-- Subtitle -->
  <text class="sub" x="450" y="122" text-anchor="middle"
        font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="16" fill="#ffeaa0" opacity="0.9">Systems thinker. Problem solver. Builder.</text>
</svg>
