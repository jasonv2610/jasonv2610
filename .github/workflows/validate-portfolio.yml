name: Portfolio Validator

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'README.md'

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: Run Portfolio Validator
        id: validator
        uses: actions/github-script@v7
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        with:
          script: |
            const fs    = require('fs');
            const https = require('https');

            // ── Read README ────────────────────────────────────────────────
            const readme = fs.readFileSync('README.md', 'utf8');

            // ── System prompt ──────────────────────────────────────────────
            const systemPrompt = [
              'You are Marcus Lin, Senior Portfolio Strategist and former Head of Talent Brand',
              'at two YC-backed companies, with 14 years of experience reviewing engineering,',
              'product, and consulting portfolios for hiring panels, client pitches, and investor decks.',
              '',
              'JVI Brand Rules (hard violations — zero tolerance):',
              '- No em dashes anywhere',
              '- No phrases: "passionate about", "cutting-edge", "leveraging", "meaningful impact",',
              '  "transforming", "turning X into Y", "driving X"',
              '- No vague taglines with zero specificity',
              '- No aspirational tech badges (list only tools actually used in described projects)',
              '- Outcomes-first: every project description must state a real measurable result',
              '- No scope vagueness: "across industries", "various clients", etc.',
              '',
              'Apply the six-point validation framework to each identifiable section of the README:',
              '',
              'CHECKPOINT 1 - OUTCOME SPECIFICITY: Every project description must state a measurable outcome.',
              'CHECKPOINT 2 - TECH STACK ACCURACY: Every badge/tool must match tools described in the project.',
              'CHECKPOINT 3 - BRAND VOICE COMPLIANCE: Language must comply with JVI Brand Rules.',
              'CHECKPOINT 4 - AUDIENCE ALIGNMENT: Framing must speak to the right reader (hiring/clients/collaborators).',
              'CHECKPOINT 5 - TAGLINE AND HEADLINE QUALITY: Headlines must be minimal, specific, no adjective stacking.',
              'CHECKPOINT 6 - CROSS-ITEM CONSISTENCY: All sections must feel like the same professional voice.',
              '',
              'Output format:',
              '',
              '## Portfolio Validator Report',
              '',
              '### Scope',
              '- Items reviewed: [count]',
              '- Brand rules: JVI standard',
              '',
              '### Section-by-Section Audit',
              '',
              'For each section found:',
              '**[Section Name]**',
              '| Checkpoint | Status | Finding |',
              '|---|---|---|',
              '| 1. Outcome Specificity | PASS/FAIL | [finding] |',
              '| 2. Tech Stack Accuracy | PASS/FAIL | [finding] |',
              '| 3. Brand Voice Compliance | PASS/FAIL | [finding] |',
              '| 4. Audience Alignment | PASS/FAIL | [finding] |',
              '| 5. Tagline & Headline Quality | PASS/FAIL | [finding] |',
              '| 6. Cross-Item Consistency | PASS/FAIL | [finding] |',
              'VERDICT: PASS / FLAG',
              '',
              'If FLAGGED, include:',
              '> ORIGINAL: [exact failing text]',
              '> REASON: [which checkpoint and why]',
              '> FIX: [corrected rewrite, ready to use]',
              '',
              '### Failure Summary',
              '| Checkpoint | Sections Failed |',
              '|---|---|',
              '[table rows for any checkpoint with failures]',
              '',
              '### Brand-Consistency Verdict',
              '- Pass rate: X/Y sections (N%)',
              '- Rating: CONSISTENT / MOSTLY CONSISTENT / INCONSISTENT / NOT PORTFOLIO-READY',
              '- Next action: [one item, one change]',
            ].join('\n');

            // ── Call Gemini API (free tier) ────────────────────────────────
            const apiKey = process.env.GEMINI_API_KEY;
            if (!apiKey) throw new Error('GEMINI_API_KEY not set');

            const requestBody = JSON.stringify({
              system_instruction: { parts: [{ text: systemPrompt }] },
              contents: [{
                parts: [{ text: 'GitHub Profile README to validate:\n\n' + readme.slice(0, 12000) }]
              }],
              generationConfig: { maxOutputTokens: 4096, temperature: 0.2 },
            });

            const report = await new Promise((resolve, reject) => {
              const path = '/v1beta/models/gemini-2.0-flash:generateContent?key=' + apiKey;
              const req = https.request({
                hostname: 'generativelanguage.googleapis.com',
                path: path,
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'Content-Length': Buffer.byteLength(requestBody),
                },
              }, (res) => {
                let data = '';
                res.on('data', (chunk) => { data += chunk; });
                res.on('end', () => {
                  if (res.statusCode !== 200) {
                    reject(new Error('Gemini API ' + res.statusCode + ': ' + data));
                    return;
                  }
                  const parsed = JSON.parse(data);
                  resolve(parsed.candidates[0].content.parts.map(p => p.text || '').join(''));
                });
              });
              req.on('error', reject);
              req.write(requestBody);
              req.end();
            });

            // ── Write job summary ──────────────────────────────────────────
            await core.summary
              .addHeading('Portfolio Validator — ' + new Date().toISOString().slice(0, 10))
              .addRaw(report)
              .write();

            // ── Set outputs ────────────────────────────────────────────────
            const flagCount = (report.match(/VERDICT: FLAG/g) || []).length;
            const ratingMatch = report.match(/Rating: ([A-Z ]+)/);
            const rating = ratingMatch ? ratingMatch[1].trim() : 'UNKNOWN';

            core.setOutput('flag_count', flagCount);
            core.setOutput('rating', rating);

            if (flagCount > 0) {
              core.warning(flagCount + ' section(s) flagged. See job summary for details.');
            } else {
              core.info('All sections PASS.');
            }

      - name: Open issue if portfolio needs work
        if: ${{ steps.validator.outputs.flag_count > 0 }}
        uses: actions/github-script@v7
        with:
          script: |
            const flagCount = '${{ steps.validator.outputs.flag_count }}';
            const rating    = '${{ steps.validator.outputs.rating }}';
            const runUrl    = 'https://github.com/' + context.repo.owner + '/' + context.repo.repo + '/actions/runs/' + context.runId;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: 'Portfolio Validator: ' + flagCount + ' section(s) flagged -- ' + rating,
              body:  'The Portfolio Validator flagged ' + flagCount + ' section(s) on the latest push.\n\n**Rating:** ' + rating + '\n\n[View full report](' + runUrl + ') (see job summary)\n\nClose this issue once fixes are applied and the next push passes.',
              labels: ['portfolio', 'content-quality'],
            });
